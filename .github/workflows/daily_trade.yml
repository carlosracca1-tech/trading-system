name: RFTM Daily Bot

on:
  # ── Corre automáticamente de Lunes a Viernes ──────────────────────────────
  # 13:35 UTC = 9:35 AM ET en verano (EDT) / 8:35 AM ET en invierno (EST)
  # NYSE abre 9:30 AM ET — el bot corre 5 min después de la apertura
  # NOTA: en noviembre cuando vuelve EST, cambiar a '35 14 * * 1-5'
  schedule:
    - cron: '35 13 * * 1-5'

  # ── También se puede correr manualmente desde GitHub ─────────────────────
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo del run manual'
        required: false
        default: 'Test manual'

jobs:
  trade:
    name: Run RFTM Strategy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Descarga el código ──────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Configura Python ────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Instala dependencias ────────────────────────────────────────────
      - name: Install dependencies
        run: pip install pandas numpy requests gspread google-auth

      # ── 4. Crea .env.paper con las API keys guardadas en GitHub Secrets ───
      - name: Create .env.paper from secrets
        run: |
          cat > .env.paper << EOF
          ALPACA_API_KEY=${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY=${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL=https://paper-api.alpaca.markets/v2
          ALPACA_DATA_URL=https://data.alpaca.markets/v2
          PAPER_TRADING=true
          INITIAL_CAPITAL=100000
          MAX_POSITIONS=10
          MAX_POSITION_PCT=0.25
          RISK_PER_TRADE=0.05
          EMAIL_ENABLED=true
          EMAIL_SMTP_SERVER=smtp.gmail.com
          EMAIL_SMTP_PORT=587
          EMAIL_FROM=${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO=${{ secrets.EMAIL_TO }}
          EOF

      # ── 5. Verifica que las keys estén configuradas ───────────────────────
      - name: Verify API keys
        run: |
          if [ -z "${{ secrets.ALPACA_API_KEY }}" ]; then
            echo "❌ ERROR: ALPACA_API_KEY no configurada en GitHub Secrets"
            exit 1
          fi
          if [ -z "${{ secrets.ALPACA_SECRET_KEY }}" ]; then
            echo "❌ ERROR: ALPACA_SECRET_KEY no configurada en GitHub Secrets"
            exit 1
          fi
          echo "✓ API keys configuradas correctamente"

      # ── 5b. Verifica que los secrets de email estén configurados ──────────
      # Si EMAIL_ENABLED=true (default) y faltan secrets, el bot corría OK pero
      # send_email_report() salía callado con "Email not configured...". Esto
      # explicaba que el daily summary no llegara aunque el bot operara bien.
      # Si querés correr sin email, setear EMAIL_ENABLED=false en .env.paper
      # (o saltar este step en un fork).
      - name: Verify email secrets
        run: |
          missing=()
          [ -z "${{ secrets.EMAIL_FROM }}" ]     && missing+=("EMAIL_FROM")
          [ -z "${{ secrets.EMAIL_PASSWORD }}" ] && missing+=("EMAIL_PASSWORD")
          [ -z "${{ secrets.EMAIL_TO }}" ]       && missing+=("EMAIL_TO")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ ERROR: faltan secrets de email en GitHub: ${missing[*]}"
            echo "Settings → Secrets and variables → Actions → New repository secret"
            echo "Si querés correr sin email, setear EMAIL_ENABLED=false en el step 'Create .env.paper from secrets'."
            exit 1
          fi
          echo "✓ Email secrets configuradas (EMAIL_FROM, EMAIL_PASSWORD, EMAIL_TO presentes)"

      # ── 6a. Restaura la base de datos del run anterior ────────────────────
      # Incluye WAL y SHM files para no perder datos de SQLite WAL mode.
      # Sin esto, cada run arrancaba con una DB vacía y perdía stage/stop_loss.
      - name: Restore RFTM database
        uses: actions/cache/restore@v4
        with:
          path: |
            trading_paper.db
            trading_paper.db-wal
            trading_paper.db-shm
          key: rftm-db-v1-${{ github.ref_name }}
          restore-keys: |
            rftm-db-v1-

      # ── 6. Verifica si el mercado está abierto hoy ───────────────────────
      - name: Check if market is open today
        id: market_check
        run: |
          python3 - << 'EOF'
          import urllib.request, json, os, sys

          key = os.environ.get("ALPACA_API_KEY", "")
          secret = os.environ.get("ALPACA_SECRET_KEY", "")

          try:
              url = "https://paper-api.alpaca.markets/v2/clock"
              req = urllib.request.Request(url, headers={
                  "APCA-API-KEY-ID": key,
                  "APCA-API-SECRET-KEY": secret
              })
              with urllib.request.urlopen(req, timeout=10) as r:
                  data = json.loads(r.read())
              is_open = data.get("is_open", False)
              next_open = data.get("next_open", "")
              print(f"Mercado abierto: {is_open}")
              print(f"Próxima apertura: {next_open}")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write(f"market_open={'true' if is_open else 'false'}\n")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write(f"next_open={next_open}\n")
          except Exception as e:
              print(f"No se pudo verificar estado del mercado: {e}")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("market_open=true\n")
          EOF
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          SHEETS_SPREADSHEET_ID: ${{ secrets.SHEETS_SPREADSHEET_ID }}
          SHEETS_SERVICE_ACCOUNT_JSON: ${{ secrets.SHEETS_SERVICE_ACCOUNT_JSON }}

      # ── 7. Mercado cerrado: resumen visual y salida limpia ────────────────
      - name: Market closed summary
        if: steps.market_check.outputs.market_open == 'false'
        run: |
          echo "## 📅 Mercado cerrado hoy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "El NYSE está cerrado hoy (feriado o fin de semana). El bot no operó." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Próxima apertura:** ${{ steps.market_check.outputs.next_open }}" >> $GITHUB_STEP_SUMMARY

      # ── 8. Ejecuta el bot ─────────────────────────────────────────────────
      # MODE=entry_only: el bot diario SOLO evalúa nuevas entradas.
      # Los exits (stops, partials, trailing) los maneja rftm_watchdog.py
      # cada 5 min durante horario de mercado.
      - name: Run RFTM Bot
        if: steps.market_check.outputs.market_open != 'false'
        id: run_bot
        run: |
          python3 standalone_paper_trader.py 2>&1 | tee bot_output.txt
          BOT_EXIT=${PIPESTATUS[0]}
          # Force WAL checkpoint so all data is in the main .db file
          python3 -c "
          import sqlite3, os
          if os.path.exists('trading_paper.db'):
              conn = sqlite3.connect('trading_paper.db')
              conn.execute('PRAGMA wal_checkpoint(TRUNCATE)')
              conn.close()
              print('✓ WAL checkpoint completed')
          " || true
          exit $BOT_EXIT
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          SHEETS_SPREADSHEET_ID: ${{ secrets.SHEETS_SPREADSHEET_ID }}
          SHEETS_SERVICE_ACCOUNT_JSON: ${{ secrets.SHEETS_SERVICE_ACCOUNT_JSON }}
          MODE: entry_only

      # ── 8b. Guarda la base de datos para el próximo run ──────────────────
      - name: Save RFTM database
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            trading_paper.db
            trading_paper.db-wal
            trading_paper.db-shm
          key: rftm-db-v1-${{ github.ref_name }}-${{ github.run_number }}

      # ── 9. Resumen visual en GitHub Actions ──────────────────────────────
      - name: Generate visual summary
        if: steps.market_check.outputs.market_open != 'false'
        run: |
          python3 - << 'EOF'
          import urllib.request, json, os
          from datetime import datetime

          key    = os.environ.get("ALPACA_API_KEY", "")
          secret = os.environ.get("ALPACA_SECRET_KEY", "")
          today  = datetime.now().strftime("%A %d %b %Y")

          def alpaca(path):
              url = f"https://paper-api.alpaca.markets/v2{path}"
              req = urllib.request.Request(url, headers={
                  "APCA-API-KEY-ID": key, "APCA-API-SECRET-KEY": secret
              })
              try:
                  with urllib.request.urlopen(req, timeout=10) as r:
                      return json.loads(r.read())
              except:
                  return {}

          account   = alpaca("/account")
          positions = alpaca("/positions")
          orders    = alpaca("/orders?status=filled&limit=5")

          equity      = float(account.get("equity", 0))
          cash        = float(account.get("cash", 0))
          last_equity = float(account.get("last_equity", equity))
          day_pnl     = equity - last_equity
          day_pnl_pct = (day_pnl / last_equity * 100) if last_equity else 0
          total_pnl   = equity - 100_000
          total_pct   = (total_pnl / 100_000 * 100)

          day_icon  = "🟢" if day_pnl >= 0 else "🔴"
          tot_icon  = "🟢" if total_pnl >= 0 else "🔴"

          lines = []
          lines.append(f"## 🤖 RFTM Bot — {today}")
          lines.append("")
          lines.append("### 💰 Portfolio")
          lines.append("| | |")
          lines.append("|---|---|")
          lines.append(f"| **Capital total** | **${equity:,.2f}** |")
          lines.append(f"| Hoy | {day_icon} ${day_pnl:+,.2f} ({day_pnl_pct:+.2f}%) |")
          lines.append(f"| Desde inicio | {tot_icon} ${total_pnl:+,.2f} ({total_pct:+.2f}%) |")
          lines.append(f"| Cash disponible | ${cash:,.2f} |")
          lines.append("")

          if positions:
              lines.append(f"### 📈 Posiciones abiertas ({len(positions)})")
              lines.append("| ETF | Cantidad | Precio entrada | Precio actual | P&L |")
              lines.append("|---|---|---|---|---|")
              for p in positions:
                  sym     = p.get("symbol","")
                  qty     = p.get("qty","")
                  entry   = float(p.get("avg_entry_price", 0))
                  current = float(p.get("current_price", 0))
                  upnl    = float(p.get("unrealized_pl", 0))
                  icon    = "🟢" if upnl >= 0 else "🔴"
                  lines.append(f"| **{sym}** | {qty} | ${entry:.2f} | ${current:.2f} | {icon} ${upnl:+,.2f} |")
              lines.append("")
          else:
              lines.append("### 📊 Posiciones abiertas")
              lines.append("_Sin posiciones abiertas hoy._")
              lines.append("")

          if orders:
              lines.append("### 🔔 Últimas órdenes ejecutadas")
              lines.append("| ETF | Tipo | Cantidad | Precio |")
              lines.append("|---|---|---|---|")
              for o in orders[:5]:
                  sym  = o.get("symbol","")
                  side = "🟢 COMPRA" if o.get("side") == "buy" else "🔴 VENTA"
                  qty  = o.get("filled_qty","")
                  price= float(o.get("filled_avg_price") or 0)
                  lines.append(f"| **{sym}** | {side} | {qty} | ${price:.2f} |")
              lines.append("")

          # Lee el output del bot para ver señales
          try:
              with open("bot_output.txt") as f:
                  output = f.read()
              enters = [l for l in output.split("\n") if "ENTER" in l or "COMPRA" in l]
              exits  = [l for l in output.split("\n") if "EXIT" in l  or "VENTA" in l]
              if enters or exits:
                  lines.append("### 📋 Señales de hoy")
                  for e in enters[:5]: lines.append(f"- 🟢 {e.strip()}")
                  for e in exits[:5]:  lines.append(f"- 🔴 {e.strip()}")
                  lines.append("")
          except:
              pass

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")
          with open(summary_path, "a") as f:
              f.write("\n".join(lines))
          print("Resumen generado correctamente")
          EOF
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          SHEETS_SPREADSHEET_ID: ${{ secrets.SHEETS_SPREADSHEET_ID }}
          SHEETS_SERVICE_ACCOUNT_JSON: ${{ secrets.SHEETS_SERVICE_ACCOUNT_JSON }}

      # ── 10. Sube los logs como artefacto ──────────────────────────────────
      # continue-on-error: un fallo del upload (ej. cuota de artifacts llena)
      # NO debe romper el job. El bot ya operó arriba.
      - name: Upload logs
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: rftm-log-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            logs/
            *.log
            bot_output.txt
          retention-days: 7
          if-no-files-found: ignore
