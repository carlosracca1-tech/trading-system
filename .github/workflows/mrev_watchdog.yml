name: MREV Watchdog (Exits)

# Estrategia: cripto opera 24/7. GH Actions job dura máximo 6h.
# Disparamos 5 veces por día (cada 5h con margen para overlap),
# cada fire loopea internamente por 5h05 (305 min). El overlap
# garantiza cobertura 24/7 aunque algún cron se pierda.
# concurrency: no cancel — si dos runs se solapan, los dos corren
# (el segundo termina el primero por timeout antes que el nuevo).

on:
  schedule:
    - cron: '5 0,5,10,15,20 * * *'   # 5 fires/día con 5h de spacing
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Modo dry-run (no enviar órdenes)'
        required: false
        default: 'true'
      loop_minutes:
        description: 'Cuántos minutos loopear (default 305 = 5h05)'
        required: false
        default: '305'

concurrency:
  group: mrev-watchdog-${{ github.ref }}
  cancel-in-progress: false

jobs:
  watchdog:
    name: MREV Watchdog — continuous loop
    runs-on: ubuntu-latest
    timeout-minutes: 310

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install pandas numpy gspread google-auth

      - name: Restore MREV database
        uses: actions/cache/restore@v4
        with:
          path: |
            mrev_paper.db
            mrev_paper.db-wal
            mrev_paper.db-shm
          key: mrev-db-v2-${{ github.ref_name }}
          restore-keys: |
            mrev-db-v2-

      - name: Write .env.paper
        run: |
          cat > .env.paper << EOF
          ALPACA_API_KEY=${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY=${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL=https://paper-api.alpaca.markets/v2
          EOF

      - name: Diagnose sheets connectivity (1 round-trip, no writes)
        continue-on-error: true
        env:
          SHEETS_SPREADSHEET_ID: ${{ secrets.SHEETS_SPREADSHEET_ID }}
          SHEETS_SERVICE_ACCOUNT_JSON: ${{ secrets.SHEETS_SERVICE_ACCOUNT_JSON }}
        run: |
          python3 - <<'PY'
          import os, json
          sid = os.environ.get('SHEETS_SPREADSHEET_ID', '')
          sa = os.environ.get('SHEETS_SERVICE_ACCOUNT_JSON', '')
          print(f"[diag] SHEETS_SPREADSHEET_ID present={bool(sid)} len={len(sid)}")
          print(f"[diag] SHEETS_SERVICE_ACCOUNT_JSON present={bool(sa)} len={len(sa)}")
          if sa:
              try:
                  d = json.loads(sa)
                  print(f"[diag] JSON ok — client_email={d.get('client_email')}")
                  pk = d.get('private_key', '')
                  print(f"[diag] private_key len={len(pk)} real_nl={chr(10) in pk} escaped_nl={'\\n' in pk}")
              except Exception as e:
                  print(f"[diag] JSON parse FAIL: {type(e).__name__}: {e}")
          try:
              import gspread
              from google.oauth2.service_account import Credentials
              if sa and sid:
                  creds = Credentials.from_service_account_info(
                      json.loads(sa),
                      scopes=['https://www.googleapis.com/auth/spreadsheets',
                              'https://www.googleapis.com/auth/drive'],
                  )
                  sh = gspread.authorize(creds).open_by_key(sid)
                  print(f"[diag] sheet OK: {sh.title} | tabs: {[w.title for w in sh.worksheets()]}")
          except Exception as e:
              print(f"[diag] FAIL: {type(e).__name__}: {e}")
          PY

      - name: Continuous watchdog loop
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          SHEETS_SPREADSHEET_ID: ${{ secrets.SHEETS_SPREADSHEET_ID }}
          SHEETS_SERVICE_ACCOUNT_JSON: ${{ secrets.SHEETS_SERVICE_ACCOUNT_JSON }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          LOOP_MINUTES: ${{ github.event.inputs.loop_minutes || '305' }}
        run: |
          set +e
          LOOP_S=$((LOOP_MINUTES * 60))
          END=$(( $(date +%s) + LOOP_S ))
          ITER=0
          echo "▶ Continuous loop starting — will run until $(date -u -d @$END '+%Y-%m-%d %H:%M:%S UTC') (LOOP_MINUTES=$LOOP_MINUTES)"
          while [ $(date +%s) -lt $END ]; do
            ITER=$((ITER + 1))
            TS=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
            echo ""
            echo "═══ iter #$ITER @ $TS ═══════════════════════════════════"
            python3 mrev_watchdog.py 2>&1 | tee -a mrev_watchdog_output.txt
            python3 -c "
            import sqlite3, os
            for p in ['mrev_paper.db']:
                if os.path.exists(p):
                    try:
                        c = sqlite3.connect(p)
                        c.execute('PRAGMA wal_checkpoint(TRUNCATE)')
                        c.close()
                    except Exception as e:
                        print(f'wal checkpoint fail: {e}')
            " || true
            sleep 90
          done
          echo ""
          echo "▶ Loop ended after $ITER iterations"

      - name: Save MREV database
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            mrev_paper.db
            mrev_paper.db-wal
            mrev_paper.db-shm
          key: mrev-db-v2-${{ github.ref_name }}-${{ github.run_id }}

      - name: Upload logs
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: mrev-watchdog-${{ github.run_id }}
          path: |
            mrev_watchdog_output.txt
          retention-days: 1
          if-no-files-found: ignore
