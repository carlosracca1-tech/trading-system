name: MREV-4H Bot

on:
  # ── Corre cada 4 horas, todos los días (crypto es 24/7) ─────────────────
  # Velas 4H cierran en 00, 04, 08, 12, 16, 20 UTC.
  # El bot corre 1h05 después del cierre de vela para garantizar datos completos.
  schedule:
    - cron: '5 1,5,9,13,17,21 * * *'

  # ── También se puede correr manualmente desde GitHub ─────────────────────
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo del run manual'
        required: false
        default: 'Test manual MREV'
      dry_run:
        description: 'Solo escanear señales (no operar)'
        required: false
        default: 'false'

# ── Evita runs simultáneos (si uno tarda, el siguiente espera) ──────────────
concurrency:
  group: mrev-4h-${{ github.ref }}
  cancel-in-progress: false

jobs:
  trade:
    name: Run MREV-4H Strategy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # F2: necesario para que state_db_push.sh pushee la branch state/db
    permissions:
      contents: write

    steps:
      # ── 1. Descarga el código ──────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Configura Python ────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Instala dependencias (solo pandas + numpy) ──────────────────────
      - name: Install dependencies
        run: pip install pandas numpy gspread google-auth

      # ── 4. Crea .env.paper con las API keys ───────────────────────────────
      - name: Create .env.paper from secrets
        run: |
          cat > .env.paper <<'ENVEOF'
          ALPACA_API_KEY=${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY=${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL=https://paper-api.alpaca.markets/v2
          MREV_INITIAL_CAPITAL=25000
          MREV_MAX_POSITIONS=6
          MREV_RISK_PER_TRADE=0.05
          EMAIL_ENABLED=true
          EMAIL_SMTP_SERVER=smtp.gmail.com
          EMAIL_SMTP_PORT=587
          EMAIL_FROM=${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO=${{ secrets.EMAIL_TO }}
          EMAIL_HOURS_UTC=12
          EMAIL_MONTHLY_ENABLED=true
          EMAIL_MONTHLY_DAY=1
          ACCOUNT_TOTAL_CAPITAL=100000
          DAILY_BOT_CAPITAL=75000
          ENVEOF
          # Strip leading whitespace from each line (YAML indentation artifact)
          sed -i 's/^[[:space:]]*//' .env.paper

      # ── 5. Verifica que las keys estén configuradas ───────────────────────
      - name: Verify API keys
        run: |
          if [ -z "${{ secrets.ALPACA_API_KEY }}" ]; then
            echo "❌ ERROR: ALPACA_API_KEY no configurada en GitHub Secrets"
            exit 1
          fi
          echo "✓ API keys configuradas"

      # ── 5b. Verifica que los secrets de email estén configurados ──────────
      # Si EMAIL_ENABLED=true (default) y faltan secrets, el bot corría OK pero
      # send_email_report() salía callado. Ver fix(rftm) en daily_trade.yml.
      - name: Verify email secrets
        run: |
          missing=()
          [ -z "${{ secrets.EMAIL_FROM }}" ]     && missing+=("EMAIL_FROM")
          [ -z "${{ secrets.EMAIL_PASSWORD }}" ] && missing+=("EMAIL_PASSWORD")
          [ -z "${{ secrets.EMAIL_TO }}" ]       && missing+=("EMAIL_TO")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ ERROR: faltan secrets de email en GitHub: ${missing[*]}"
            echo "Settings → Secrets and variables → Actions → New repository secret"
            echo "Si querés correr sin email, setear EMAIL_ENABLED=false en .env.paper arriba."
            exit 1
          fi
          echo "✓ Email secrets configuradas (EMAIL_FROM, EMAIL_PASSWORD, EMAIL_TO presentes)"

      # ── 6. Restaura la base de datos del run anterior ─────────────────────
      # Incluye WAL y SHM files para no perder datos de SQLite WAL mode
      - name: Restore MREV database
        uses: actions/cache/restore@v4
        with:
          path: |
            mrev_paper.db
            mrev_paper.db-wal
            mrev_paper.db-shm
          key: mrev-db-v2-${{ github.ref_name }}
          restore-keys: |
            mrev-db-v2-

      # ── 6b. Restaura el JSONL de eventos de trade MREV (F5.0 — KAIZEN data) ────
      # Archivo separado del RFTM para evitar race entre workflows paralelos.
      - name: Restore MREV trade events JSONL
        uses: actions/cache/restore@v4
        with:
          path: logs/trade_events_mrev.jsonl
          key: mrev-events-v1-${{ github.ref_name }}
          restore-keys: |
            mrev-events-v1-

      # ── 7. Ejecuta el bot MREV ────────────────────────────────────────────
      - name: Run MREV-4H Bot
        id: run_bot
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python3 standalone_mrev_trader.py --dry-run 2>&1 | tee mrev_output.txt
          else
            python3 standalone_mrev_trader.py 2>&1 | tee mrev_output.txt
          fi
          BOT_EXIT=$?
          echo "bot_exit_code=$BOT_EXIT" >> "$GITHUB_OUTPUT"
          # Force WAL checkpoint so all data is in the main .db file
          python3 -c "
          import sqlite3
          conn = sqlite3.connect('mrev_paper.db')
          conn.execute('PRAGMA wal_checkpoint(TRUNCATE)')
          conn.close()
          print('✓ WAL checkpoint completed')
          " || true
          exit $BOT_EXIT
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          SHEETS_SPREADSHEET_ID: ${{ secrets.SHEETS_SPREADSHEET_ID }}
          SHEETS_SERVICE_ACCOUNT_JSON: ${{ secrets.SHEETS_SERVICE_ACCOUNT_JSON }}
          TRADE_EVENTS_JSONL_PATH: logs/trade_events_mrev.jsonl
          # MODE=entry_only: exits los maneja mrev_watchdog.py cada 5m.
          MODE: entry_only

      # ── 8. Guarda la base de datos para el próximo run ─────────────────────
      - name: Save MREV database
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            mrev_paper.db
            mrev_paper.db-wal
            mrev_paper.db-shm
          key: mrev-db-v2-${{ github.ref_name }}-${{ github.run_number }}

      # ── 8b. Guarda el JSONL de eventos de trade MREV ─────────────────────
      - name: Save MREV trade events JSONL
        if: always()
        uses: actions/cache/save@v4
        with:
          path: logs/trade_events_mrev.jsonl
          key: mrev-events-v1-${{ github.ref_name }}-${{ github.run_number }}

      # ── 9. Resumen visual en GitHub Actions ──────────────────────────────
      - name: Generate visual summary
        if: always()
        run: |
          python3 - << 'PYEOF'
          import json, os, re
          from datetime import datetime

          now = datetime.utcnow().strftime("%A %d %b %Y %H:%M UTC")

          lines = []
          lines.append(f"## 🔄 MREV-4H Bot — {now}")
          lines.append("")

          # Parse output for key info
          try:
              with open("mrev_output.txt") as f:
                  output = f.read()
              for line in output.split("\n"):
                  if any(k in line for k in ["Equity:", "ENTER", "EXIT", "Summary",
                                              "kill_switch", "no_markets", "no_data",
                                              "orders placed", "Cash:"]):
                      clean = re.sub(r'\x1b\[[0-9;]*m', '', line).strip()
                      if clean:
                          lines.append(f"- {clean}")
          except:
              lines.append("- Bot output not available")

          lines.append("")
          lines.append("*Strategy: Mean Reversion on 4H candles (BTC, ETH, SOL, AVAX, DOGE, LINK)*")

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")
          with open(summary_path, "a") as f:
              f.write("\n".join(lines))
          PYEOF

      # ── 10. Sube los logs como artefacto ──────────────────────────────────
      # continue-on-error: un fallo del upload (ej. cuota de artifacts llena)
      # NO debe romper el job. El bot ya operó arriba; los artifacts son
      # diagnóstico secundario.
      - name: Upload logs
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: mrev-log-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            mrev_output.txt
            mrev_paper.db
          retention-days: 7
          if-no-files-found: ignore

      # Fallback de visibilidad: si state/db push falla, el JSONL queda
      # descargable desde la UI durante 7 días.
      - name: Upload trade events JSONL + DB snapshot
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: mrev-state-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            logs/trade_events_mrev.jsonl
            logs/kaizen_missed_moves.jsonl
            mrev_paper.db
          retention-days: 7
          if-no-files-found: ignore

      # ── 11. F2: Push del snapshot a la branch state/db ────────────────────
      - name: Push state to branch state/db
        if: always()
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          BOT_TAG: mrev
          STATE_DB_FILES: "mrev_paper.db logs/trade_events_mrev.jsonl logs/kaizen_missed_moves.jsonl"
        run: bash scripts/state_db_push.sh
