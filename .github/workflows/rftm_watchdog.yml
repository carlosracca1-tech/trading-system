name: RFTM Watchdog (Exits)

# Estrategia: en vez de cron */5 (que GH Actions ejecuta con gaps de
# hasta 1.5h por rate-limiting), disparamos UNA vez al abrir el mercado
# y el job loopea internamente cada 90s durante 6h45 hasta cerrar.
# Resultado: cobertura real cada 90s, sin depender de la confiabilidad
# del cron de GH Actions para granularidad fina.
#
# Backup: cron extra al mediodía por si el primer trigger se perdió
# (idempotente — concurrency group cancela ejecuciones duplicadas).

on:
  schedule:
    - cron: '30 13 * * 1-5'   # 13:30 UTC = 9:30 AM ET (apertura NYSE en EDT)
    - cron: '0 17 * * 1-5'    # 17:00 UTC backup (por si el primero falló)
  # Cualquier push que toque el watchdog o el código de exits dispara un run
  # automático — no hace falta clickear "Run workflow" para validar cambios.
  push:
    branches: [main]
    paths:
      - 'rftm_watchdog.py'
      - '_exit_logic.py'
      - '_sheets_logger.py'
      - 'standalone_paper_trader.py'
      - '.github/workflows/rftm_watchdog.yml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Modo dry-run (no enviar órdenes)'
        required: false
        default: 'true'
      force_run:
        description: 'Correr incluso con mercado cerrado'
        required: false
        default: 'false'
      loop_minutes:
        description: 'Cuántos minutos loopear (default 405 = 6h45)'
        required: false
        default: '405'

concurrency:
  group: rftm-watchdog-${{ github.ref }}
  cancel-in-progress: false

jobs:
  watchdog:
    name: RFTM Watchdog — continuous loop
    runs-on: ubuntu-latest
    # Hard ceiling = 410 min (un poco más que el loop_minutes default,
    # para que el job termine grácil cuando el loop salga).
    timeout-minutes: 410
    # F2: necesario para que state_db_push.sh pushee la branch state/db
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install pandas numpy gspread google-auth

      - name: Restore RFTM database
        uses: actions/cache/restore@v4
        with:
          path: |
            trading_paper.db
            trading_paper.db-wal
            trading_paper.db-shm
          key: rftm-db-v1-${{ github.ref_name }}
          restore-keys: |
            rftm-db-v1-

      - name: Restore RFTM trade events JSONL
        uses: actions/cache/restore@v4
        with:
          path: logs/trade_events_rftm.jsonl
          key: rftm-events-v1-${{ github.ref_name }}
          restore-keys: |
            rftm-events-v1-

      # F3.2: restore del JSONL de health para acumular histórico entre runs
      - name: Restore watchdog health JSONL
        uses: actions/cache/restore@v4
        with:
          path: logs/kaizen_health.jsonl
          key: kaizen-health-v1-${{ github.ref_name }}
          restore-keys: |
            kaizen-health-v1-

      - name: Write .env.paper
        run: |
          cat > .env.paper << EOF
          ALPACA_API_KEY=${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY=${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL=https://paper-api.alpaca.markets/v2
          EOF

      - name: Diagnose sheets connectivity (1 round-trip, no writes)
        continue-on-error: true
        env:
          SHEETS_SPREADSHEET_ID: ${{ secrets.SHEETS_SPREADSHEET_ID }}
          SHEETS_SERVICE_ACCOUNT_JSON: ${{ secrets.SHEETS_SERVICE_ACCOUNT_JSON }}
        run: |
          python3 - <<'PY'
          import os, json
          sid = os.environ.get('SHEETS_SPREADSHEET_ID', '')
          sa = os.environ.get('SHEETS_SERVICE_ACCOUNT_JSON', '')
          print(f"[diag] SHEETS_SPREADSHEET_ID present={bool(sid)} len={len(sid)} value={sid[:10]+'...' if sid else 'EMPTY'}")
          print(f"[diag] SHEETS_SERVICE_ACCOUNT_JSON present={bool(sa)} len={len(sa)}")
          if sa:
              try:
                  d = json.loads(sa)
                  print(f"[diag] JSON ok — client_email={d.get('client_email')} project_id={d.get('project_id')}")
                  pk = d.get('private_key', '')
                  print(f"[diag] private_key len={len(pk)} starts={pk[:35]!r}")
                  has_real_nl = '\n' in pk
                  has_escaped = '\\n' in pk
                  print(f"[diag] private_key has real newlines={has_real_nl} has escaped \\n literal={has_escaped}")
              except Exception as e:
                  print(f"[diag] JSON parse FAIL: {type(e).__name__}: {e}")
                  print(f"[diag] first 80 chars: {sa[:80]!r}")
                  print(f"[diag] last 80 chars: {sa[-80:]!r}")
          else:
              print("[diag] SHEETS_SERVICE_ACCOUNT_JSON está vacío — secret no llegó")
          try:
              import gspread
              from google.oauth2.service_account import Credentials
              print(f"[diag] gspread {gspread.__version__} OK")
              if sa:
                  creds = Credentials.from_service_account_info(
                      json.loads(sa),
                      scopes=['https://www.googleapis.com/auth/spreadsheets',
                              'https://www.googleapis.com/auth/drive'],
                  )
                  client = gspread.authorize(creds)
                  sh = client.open_by_key(sid)
                  print(f"[diag] open_by_key OK — sheet title: {sh.title}")
                  ws_titles = [ws.title for ws in sh.worksheets()]
                  print(f"[diag] worksheets: {ws_titles}")
          except Exception as e:
              print(f"[diag] FAIL: {type(e).__name__}: {e}")
          PY

      - name: Continuous watchdog loop
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          SHEETS_SPREADSHEET_ID: ${{ secrets.SHEETS_SPREADSHEET_ID }}
          SHEETS_SERVICE_ACCOUNT_JSON: ${{ secrets.SHEETS_SERVICE_ACCOUNT_JSON }}
          TRADE_EVENTS_JSONL_PATH: logs/trade_events_rftm.jsonl
          # Cron scheduling: DRY_RUN=false (manda órdenes reales).
          # workflow_dispatch manual: default true para tests.
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}
          LOOP_MINUTES: ${{ github.event.inputs.loop_minutes || '405' }}
        run: |
          set +e
          LOOP_S=$((LOOP_MINUTES * 60))
          END=$(( $(date +%s) + LOOP_S ))
          ITER=0
          echo "▶ Continuous loop starting — will run until $(date -u -d @$END '+%Y-%m-%d %H:%M:%S UTC') (LOOP_MINUTES=$LOOP_MINUTES)"
          while [ $(date +%s) -lt $END ]; do
            ITER=$((ITER + 1))
            TS=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
            echo ""
            echo "═══ iter #$ITER @ $TS ═══════════════════════════════════"
            python3 rftm_watchdog.py 2>&1 | tee -a watchdog_output.txt
            # WAL checkpoint para que el cache no crezca
            python3 -c "
            import sqlite3, os
            for p in ['trading_paper.db']:
                if os.path.exists(p):
                    try:
                        c = sqlite3.connect(p)
                        c.execute('PRAGMA wal_checkpoint(TRUNCATE)')
                        c.close()
                    except Exception as e:
                        print(f'wal checkpoint fail: {e}')
            " || true
            # Sleep 90s entre iteraciones
            sleep 90
          done
          echo ""
          echo "▶ Loop ended after $ITER iterations"

      - name: Save RFTM database
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            trading_paper.db
            trading_paper.db-wal
            trading_paper.db-shm
          key: rftm-db-v1-${{ github.ref_name }}-${{ github.run_id }}

      - name: Save RFTM trade events JSONL
        if: always()
        uses: actions/cache/save@v4
        with:
          path: logs/trade_events_rftm.jsonl
          key: rftm-events-v1-${{ github.ref_name }}-${{ github.run_id }}

      # F3.2: persistir el JSONL de health checks
      - name: Save watchdog health JSONL
        if: always()
        uses: actions/cache/save@v4
        with:
          path: logs/kaizen_health.jsonl
          key: kaizen-health-v1-${{ github.ref_name }}-${{ github.run_id }}

      - name: Upload logs
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: rftm-watchdog-${{ github.run_id }}
          path: |
            watchdog_output.txt
          retention-days: 1
          if-no-files-found: ignore

      # Fallback de visibilidad para Charlie: si state/db push falla (e.g.
      # contents:write no efectivo), el JSONL queda descargable desde la UI
      # del workflow durante 7 días. Sin esto, el historial de trades vive
      # solo en la cache de GHA y no hay manera de bajarlo a la Mac.
      - name: Upload trade events JSONL + DB snapshot
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: rftm-state-${{ github.run_id }}
          path: |
            logs/trade_events_rftm.jsonl
            logs/kaizen_missed_moves.jsonl
            logs/kaizen_health.jsonl
            trading_paper.db
          retention-days: 7
          if-no-files-found: ignore

      # F2: Push del snapshot a la branch state/db
      - name: Push state to branch state/db
        if: always()
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          BOT_TAG: rftm-wd
          STATE_DB_FILES: "trading_paper.db logs/trade_events_rftm.jsonl logs/kaizen_missed_moves.jsonl logs/kaizen_health.jsonl"
        run: bash scripts/state_db_push.sh
